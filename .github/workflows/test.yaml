name: "Linux flake"
on:
  pull_request:
  push:

jobs:
  linux-build:
    runs-on: ${{ matrix.runner }}

    strategy:
      matrix:
        include:
          - arch: x86_64-linux
            runner: ubuntu-latest
          - arch: arm64-linux
            runner: ubuntu-24.04-arm

    steps:

    - name: "Git checkout"
      uses: actions/checkout@v4

    - name: "Setup nix"
      uses: cachix/install-nix-action@v25
      with:
        nix_path: nixpkgs=channel:nixos-unstable

    - name: "Init cachix action"
      uses: cachix/cachix-action@v14
      with:
        name: mycache
        signingKey: '${{ secrets.CACHIX_SIGNING_KEY }}'
        authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

    - name: "Build flake `out` output"
      run: nix build .#shvulkan.out
    
    - name: "Build flake `dev` output"
      run: nix build .#shvulkan.dev

    - name: "Check flake hash"
      run: nix flake check

    - name: "Create release archive"
      working-directory: nix/out/${{ matrix.arch }}
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cp -r result shvulkan-${{ github.ref_name }}-${{ matrix.arch }}
        zip -r ../../../shvulkan-${{ github.ref_name }}-${{ matrix.arch }}.zip shvulkan-${{ github.ref_name }}-${{ matrix.arch }}/*
        rm shvulkan-${{ github.ref_name }}-${{ matrix.arch }}

    - name: "Upload release archive"
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: shvulkan-${{ github.ref_name }}-${{ matrix.arch }}.zip
        overwrite_files: true

    - name: "Success"
      run: echo "Build completed successfully"
